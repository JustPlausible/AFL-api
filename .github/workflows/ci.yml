name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python source
        run: python -m compileall .

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

      - name: Build Docker image
        run: docker build --tag afl-api-ci .

      - name: Validate Docker image source files
        run: |
          docker run --rm --entrypoint sh afl-api-ci -c '\
            test -f main.py && \
            test -f requirements.txt && \
            test -d scraper && \
            test -d db && \
            test -d utils\
          '
