name: afl-api

services:
  afl-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${AFL_API_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - afl-api-data:/app/data
      - afl-api-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  afl-admin:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn admin:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "${AFL_ADMIN_PORT:-8001}:8001"
    env_file:
      - .env
    volumes:
      - .:/app
      - afl-api-data:/app/data
      - afl-api-logs:/app/logs
    restart: unless-stopped
    networks:
      - default
      - management

  afl-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn scheduler.start:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - .:/app
      - afl-api-data:/app/data
      - afl-api-logs:/app/logs
    depends_on:
      - afl-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - default
      - management

volumes:
  afl-api-data:
  afl-api-logs:

networks:
  default:
    driver: bridge
  management:
    driver: bridge
    internal: true
