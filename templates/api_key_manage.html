{% extends "base.html" %}

{% block title %}API Key Details{% endblock %}

{% block content %}
<h2>🔐 API Key #{{ key.id }}</h2>
<p><strong>Label:</strong> {{ key.label }}</p>
<p><strong>Key:</strong> <code>{{ key.api_key }}</code></p>
<p><strong>Status:</strong>
  {% if key.is_active %}
    <span class="badge bg-success">Active</span>
  {% else %}
    <span class="badge bg-secondary">Inactive</span>
  {% endif %}
</p>

<a href="/setup/api-keys" class="btn btn-outline-secondary btn-sm">← Back to All Keys</a>
{% endblock %}
