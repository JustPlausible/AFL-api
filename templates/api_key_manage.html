<!DOCTYPE html>
<html>
<head>
  <title>Manage API Key</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form { margin-top: 10px; }
    .key { font-family: monospace; background: #eee; padding: 6px 10px; display: inline-block; }
    .actions button { margin-right: 10px; }
  </style>
</head>
<body>
  <a href="/api-keys">← Back to list</a>
  <h1>🔧 Manage API Key: {{ key['label'] }}</h1>
  <p><strong>API Key:</strong> <span class="key">{{ key['api_key'] }}</span></p>
  <p><strong>Active?</strong> {{ "✅ Yes" if key['is_active'] else "❌ No" }}</p>
  <p><strong>Created:</strong> {{ key['created_at'] }}</p>

  <div class="actions">
    <form method="post" action="/api-keys/{{ key['id'] }}/renew" style="display:inline;">
      <button type="submit">♻️ Renew Key</button>
    </form>
    <form method="post" action="/api-keys/{{ key['id'] }}/toggle" style="display:inline;">
      <button type="submit">{{ "🚫 Deactivate" if key['is_active'] else "✅ Activate" }}</button>
    </form>
  </div>
</body>
</html>
