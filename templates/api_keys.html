<!DOCTYPE html>
<html>
<head>
    <title>🔑 API Keys</title>
    <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
    a.button { padding: 4px 8px; background: #007bff; color: #fff; text-decoration: none; border-radius: 4px; }
    a.button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <a href="/">← Back Home</a>
    <h1>🔑 API Key Manager</h1>
    <table>
        <tr>
        <th>Label</th>
        <th>API Key</th>
        <th>Active?</th>
        <th>Created</th>
        <th>Action</th>
        </tr>
        {% for key in api_keys %}
        <tr>
            <td>{{ key['label'] }}</td>
            <td>{{ key['api_key'][:4] }}...{{ key['api_key'][-4:] }}</td>
            <td>{{ "✅" if key['is_active'] else "❌" }}</td>
            <td>{{ key['created_at'] }}</td>
            <td><a class="button" href="/api-keys/{{ key['id'] }}">Manage</a>
                <form method="post" action="/api-keys/delete/{{ key.id }}" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this key?');">
                    <button type="submit" style="background-color: #f44336; color: white;">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
    <h2 style="margin-top: 30px;">➕ Add New API Key</h2>
    <form method="post" action="/api-keys/new">
    <label for="label">Label:</label>
    <input type="text" name="label" required>
    <button type="submit">Create Key</button>
    </form>

</body>
</html>
