<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AFL Admin Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .page-link {
        display: inline-block;
        padding: 6px 12px;
        margin: 0 2px;
        border: 1px solid #ccc;
        border-radius: 3px;
        text-decoration: none;
        color: #333;
        background: #f8f9fa;
    }
    .page-link.active {
        background: #007bff;
        color: white;
        border-color: #007bff;
    }
    .page-ellipsis {
        display: inline-block;
        padding: 6px 8px;
        color: #888;
    }
</style>
</head>
<body class="bg-light text-dark">
    <div class="container py-4">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">AFL API Admin</h1>
            <nav>
                <a class="btn btn-sm btn-outline-primary me-1" href="/">Home</a>
                <a class="btn btn-sm btn-outline-secondary me-1" href="/schedule">Schedule</a>
                <a class="btn btn-sm btn-outline-secondary me-1" href="/tables">Tables</a>
                <a class="btn btn-sm btn-outline-secondary me-1" href="/logs">Logs</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
