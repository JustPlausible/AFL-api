{% extends "base.html" %}

{% block title %}Database Tables{% endblock %}

{% block content %}
<h2>📚 Available Tables</h2>
<ul class="list-group">
  {% for table in tables %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      {{ table }}
      <a href="/table/{{ table }}" class="btn btn-sm btn-outline-primary">View</a>
    </li>
  {% endfor %}
</ul>
{% endblock %}
